<div>
  {{ workoutTimerSignal() | async }}
</div>
<div>
  {{ restTimerSignal() | async }}
</div>
@if (currentWorkout(); as workout) {
  @for (excercise of workout.workoutExercises; track excercise.id) {
    <div>
      <olab-excercise-picker
        [performedExcerciseIds]="getPerformedExcercises(workout)"
        [excercise]="excercise"
        (excercisePicked)="startExcercise(excercise.id, $event)"></olab-excercise-picker>
    </div>
  }
}
