<select #picker [disabled]="excercise.exerciseId">
  @for (e of exercisePlanSignal()?.possibleExercises; track $index) {
    <option
      [disabled]="wasExcercisePerformed(e.id) || singleItemOtherExercisesSignal().indexOf(e.id) >= 0"
      [selected]="excercise.exerciseId === e.id"
      value="{{ e.id }}">
      {{ e.name }}
    </option>
  }
</select>
<button [disabled]="excercise.exerciseId" (click)="pickExcercise()">Start</button>
