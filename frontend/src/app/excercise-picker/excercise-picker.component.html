<select #picker [disabled]="excercise.exerciseId">
  @for (excerciseId of exercisePlanSignal()?.exercises; track $index) {
    <option
      [disabled]="wasExcercisePerformed(excerciseId)"
      [selected]="excercise.exerciseId === excerciseId"
      value="{{ excerciseId }}">
      {{ excerciseId }}
    </option>
  }
</select>
<button [disabled]="excercise.exerciseId" (click)="pickExcercise()">Start</button>
