<select #picker [disabled]="excercise.performedExcerciseId">
  @for (excerciseId of excercise.excerciseIds; track $index) {
    <option
      [disabled]="wasExcercisePerformed(excerciseId)"
      [selected]="excercise.performedExcerciseId === excerciseId"
      value="{{ excerciseId }}">
      {{ excerciseId }}
    </option>
  }
</select>
<button [disabled]="excercise.performedExcerciseId" (click)="pickExcercise()">Start</button>
